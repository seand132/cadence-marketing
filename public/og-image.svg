<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F0E8"/>

  <!-- Cadence Logomark top-left -->
  <g transform="translate(60, 40) scale(0.4)">
    <g transform="translate(100, 100)">
      <rect x="-42" y="-12" width="12" height="44" rx="6" fill="#C8782A"/>
      <rect x="-20" y="-38" width="12" height="70" rx="6" fill="#C8782A"/>
      <rect x="2" y="-24" width="12" height="56" rx="6" fill="#C8782A"/>
      <rect x="24" y="-6" width="12" height="38" rx="6" fill="#C8782A"/>
    </g>
  </g>

  <!-- cadence wordmark -->
  <text x="148" y="95" font-family="'DM Sans', sans-serif" font-size="28" font-weight="600" letter-spacing="3" fill="#2C2C2C">cadence</text>

  <!-- Main headline line 1 -->
  <text x="600" y="255" font-family="'DM Sans', sans-serif" font-size="80" font-weight="700" letter-spacing="-2" fill="#2C2C2C" text-anchor="middle">Lead Without</text>

  <!-- Main headline line 2 -->
  <text x="600" y="345" font-family="'DM Sans', sans-serif" font-size="80" font-weight="700" letter-spacing="-2" fill="#2C2C2C" text-anchor="middle">Losing Your Mind</text>

  <!-- Subheadline -->
  <text x="600" y="410" font-family="'DM Sans', sans-serif" font-size="26" font-weight="400" fill="#3A7D7B" text-anchor="middle">Build rhythm. Build confidence.</text>

  <!-- cadencehq.co -->
  <text x="1170" y="545" font-family="'DM Sans', sans-serif" font-size="16" font-weight="400" fill="#2C2C2C" opacity="0.5" text-anchor="end">cadencehq.co</text>

  <!-- RhythmDivider — exact from cadencehq.co source -->
  <defs>
    <pattern id="rhythm-og" x="0" y="0" width="192" height="40" patternUnits="userSpaceOnUse">
      <rect x="0"   y="34" width="7" height="6"  rx="3.5" fill="#C2604A" />
      <rect x="12"  y="14" width="7" height="26" rx="3.5" fill="#C2604A" />
      <rect x="24"  y="30" width="7" height="10" rx="3.5" fill="#3A7D7B" />
      <rect x="36"  y="8"  width="7" height="32" rx="3.5" fill="#3A7D7B" />
      <rect x="48"  y="32" width="7" height="8"  rx="3.5" fill="#7B8F6A" />
      <rect x="60"  y="20" width="7" height="20" rx="3.5" fill="#7B8F6A" />
      <rect x="72"  y="34" width="7" height="6"  rx="3.5" fill="#C8782A" />
      <rect x="84"  y="6"  width="7" height="34" rx="3.5" fill="#C8782A" />
      <rect x="96"  y="30" width="7" height="10" rx="3.5" fill="#3A7D7B" />
      <rect x="108" y="22" width="7" height="18" rx="3.5" fill="#3A7D7B" />
      <rect x="120" y="34" width="7" height="6"  rx="3.5" fill="#7B8F6A" />
      <rect x="132" y="12" width="7" height="28" rx="3.5" fill="#7B8F6A" />
      <rect x="144" y="32" width="7" height="8"  rx="3.5" fill="#C2604A" />
      <rect x="156" y="18" width="7" height="22" rx="3.5" fill="#C2604A" />
      <rect x="168" y="34" width="7" height="6"  rx="3.5" fill="#C8782A" />
      <rect x="180" y="10" width="7" height="30" rx="3.5" fill="#C8782A" />
    </pattern>
  </defs>
  <rect x="0" y="590" width="1200" height="40" fill="url(#rhythm-og)" />
</svg>
