<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F0E8"/>

  <!-- Amber bottom border strip -->
  <rect x="0" y="610" width="1200" height="20" fill="#C8782A"/>

  <!-- Cadence Logomark top-left (scaled to ~80px) -->
  <g transform="translate(60, 40) scale(0.4)">
    <g transform="translate(100, 100)">
      <rect x="-42" y="-12" width="12" height="44" rx="6" fill="#C8782A"/>
      <rect x="-20" y="-38" width="12" height="70" rx="6" fill="#C8782A"/>
      <rect x="2" y="-24" width="12" height="56" rx="6" fill="#C8782A"/>
      <rect x="24" y="-6" width="12" height="38" rx="6" fill="#C8782A"/>
    </g>
  </g>

  <!-- "Cadence" wordmark next to logo -->
  <text x="148" y="95" font-family="'DM Sans', Montserrat, sans-serif" font-size="32" font-weight="600" letter-spacing="2" fill="#1C2B3A">CADENCE</text>

  <!-- Main headline -->
  <text x="600" y="290" font-family="'DM Sans', Montserrat, sans-serif" font-size="72" font-weight="300" letter-spacing="-1" fill="#2C2C2C" text-anchor="middle">Management in rhythm.</text>

  <!-- Subtext -->
  <text x="600" y="365" font-family="'DM Sans', Montserrat, sans-serif" font-size="28" font-weight="400" fill="#9C968B" text-anchor="middle">cadencehq.co</text>
</svg>
