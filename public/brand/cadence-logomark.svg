<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Cadence Logomark: Rhythmic Arcs -->
  <!-- Four ascending bars with rounded caps creating a cadence rhythm pattern -->
  <g transform="translate(100, 100)">
    <!-- Bar 1 - short -->
    <rect x="-42" y="-12" width="12" height="44" rx="6" fill="#C8782A"/>
    <!-- Bar 2 - tall -->
    <rect x="-20" y="-38" width="12" height="70" rx="6" fill="#C8782A"/>
    <!-- Bar 3 - medium -->
    <rect x="2" y="-24" width="12" height="56" rx="6" fill="#C8782A"/>
    <!-- Bar 4 - short-medium -->
    <rect x="24" y="-6" width="12" height="38" rx="6" fill="#C8782A"/>
  </g>
</svg>