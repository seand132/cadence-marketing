<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <!-- Background: deep navy -->
  <rect width="1500" height="500" fill="#1C2B3A"/>

  <!-- Subtle grid texture: horizontal lines -->
  <g opacity="0.06">
    <line x1="0" y1="100" x2="1500" y2="100" stroke="#EEF0EC" stroke-width="1"/>
    <line x1="0" y1="200" x2="1500" y2="200" stroke="#EEF0EC" stroke-width="1"/>
    <line x1="0" y1="300" x2="1500" y2="300" stroke="#EEF0EC" stroke-width="1"/>
    <line x1="0" y1="400" x2="1500" y2="400" stroke="#EEF0EC" stroke-width="1"/>
  </g>

  <!-- Rhythm bars (large, decorative, right side) -->
  <g transform="translate(1060, 80)" opacity="0.18">
    <rect x="0"   y="120" width="32" height="168" rx="16" fill="#7A9E82"/>
    <rect x="52"  y="60"  width="32" height="228" rx="16" fill="#EEF0EC"/>
    <rect x="104" y="20"  width="32" height="268" rx="16" fill="#EEF0EC"/>
    <rect x="156" y="84"  width="32" height="180" rx="16" fill="#7A9E82"/>
    <rect x="208" y="140" width="32" height="124" rx="16" fill="#7A9E82"/>
    <rect x="260" y="50"  width="32" height="248" rx="16" fill="#EEF0EC"/>
    <rect x="312" y="100" width="32" height="152" rx="16" fill="#7A9E82"/>
  </g>

  <!-- Accent bar: left edge sage stripe -->
  <rect x="0" y="0" width="6" height="500" fill="#7A9E82"/>

  <!-- Logo mark (left-center) -->
  <g transform="translate(120, 170)">
    <rect x="0"   y="48" width="18" height="68" rx="9" fill="#7A9E82"/>
    <rect x="28"  y="24" width="18" height="92" rx="9" fill="#EEF0EC"/>
    <rect x="56"  y="8"  width="18" height="108" rx="9" fill="#EEF0EC"/>
    <rect x="84"  y="36" width="18" height="76" rx="9" fill="#7A9E82"/>
  </g>

  <!-- Wordmark -->
  <text
    x="240"
    y="228"
    font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
    font-weight="300"
    font-size="82"
    letter-spacing="20"
    fill="#EEF0EC"
  >CADENCE</text>

  <!-- Tagline -->
  <text
    x="242"
    y="286"
    font-family="'Montserrat', 'Helvetica Neue', Arial, sans-serif"
    font-weight="300"
    font-size="22"
    letter-spacing="8"
    fill="#7A9E82"
  >Management in rhythm</text>

  <!-- Bottom rule -->
  <rect x="120" y="330" width="400" height="1" fill="#7A9E82" opacity="0.5"/>
</svg>
