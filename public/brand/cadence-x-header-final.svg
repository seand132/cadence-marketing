<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  
  <!-- BRAND: Cream background -->
  <rect width="1500" height="500" fill="#F5F0E8"/>

  <!-- 4-color stripe top -->
  <rect x="0"    y="0" width="375" height="8" fill="#3A7D7B"/>
  <rect x="375"  y="0" width="375" height="8" fill="#7B8F6A"/>
  <rect x="750"  y="0" width="375" height="8" fill="#C2604A"/>
  <rect x="1125" y="0" width="375" height="8" fill="#C8782A"/>

  <!-- Decorative rhythm motif — right side, teal/sage, low opacity -->
  <g opacity="0.12">
    <rect x="1060" y="80"  width="30" height="200" rx="15" fill="#3A7D7B"/>
    <rect x="1110" y="40"  width="30" height="280" rx="15" fill="#7B8F6A"/>
    <rect x="1160" y="110" width="30" height="160" rx="15" fill="#3A7D7B"/>
    <rect x="1210" y="60"  width="30" height="260" rx="15" fill="#7B8F6A"/>
    <rect x="1260" y="90"  width="30" height="220" rx="15" fill="#3A7D7B"/>
    <rect x="1310" y="50"  width="30" height="270" rx="15" fill="#7B8F6A"/>
    <rect x="1360" y="120" width="30" height="180" rx="15" fill="#3A7D7B"/>
    <rect x="1410" y="70"  width="30" height="240" rx="15" fill="#7B8F6A"/>
    <rect x="1460" y="100" width="30" height="200" rx="15" fill="#3A7D7B"/>
  </g>

  <!-- Logomark — 4 amber bars, centered vertically at x=130 -->
  <g transform="translate(130, 165)">
    <rect x="0"  y="54" width="18" height="62" rx="9" fill="#C8782A"/>
    <rect x="28" y="20" width="18" height="96" rx="9" fill="#C8782A"/>
    <rect x="56" y="36" width="18" height="80" rx="9" fill="#C8782A"/>
    <rect x="84" y="64" width="18" height="52" rx="9" fill="#C8782A"/>
  </g>

  <!-- Wordmark: cadence — DM Sans, charcoal -->
  <text
    x="270"
    y="240"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="500"
    font-size="96"
    letter-spacing="6"
    fill="#2C2C2C"
  >cadence</text>

  <!-- Tagline — warm stone -->
  <text
    x="272"
    y="296"
    font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="300"
    font-size="28"
    letter-spacing="3"
    fill="#9C968B"
  >Management in rhythm.</text>

  <!-- Amber accent divider under tagline -->
  <rect x="270" y="318" width="320" height="3" rx="1.5" fill="#C8782A" opacity="0.6"/>

  <!-- Bottom teal line -->
  <rect x="0" y="495" width="1500" height="5" fill="#3A7D7B"/>

</svg>
