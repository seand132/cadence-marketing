<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../base.css">
<style>
  .slide-8 .body {
    padding: 80px 96px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
  }
  .slide-8 .center {
    display: flex; flex-direction: column; align-items: center;
    gap: 24px;
  }
  .slide-8 .logomark { width: 180px; height: 180px; }
  .slide-8 .logomark rect { fill: var(--amber); }
  .slide-8 .wordmark {
    font-family: 'DM Sans'; font-weight: 500;
    font-size: 124px; letter-spacing: 2px;
    color: var(--cream);
    line-height: 0.9;
    margin-top: -4px;
  }
  .slide-8 .tagline {
    font-family: 'DM Sans'; font-weight: 400;
    font-size: 36px; color: var(--warmstone);
    letter-spacing: 0.5px;
    margin-top: 4px;
  }
  .slide-8 .divider {
    width: 56px; height: 2px; background: var(--amber);
    margin: 32px 0 12px;
  }
  .slide-8 .cta-eyebrow {
    font-family: 'DM Sans'; font-weight: 600;
    font-size: 16px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--amber);
  }
  .slide-8 .url {
    font-family: 'DM Sans'; font-weight: 600;
    font-size: 44px; color: var(--cream);
    letter-spacing: 0.5px;
    margin-top: 10px;
  }
  .slide-8 .footer {
    position: absolute; left: 0; right: 0; bottom: 56px;
    text-align: center;
    font-family: 'Source Sans 3'; font-weight: 400;
    font-size: 18px; color: var(--warmstone);
    letter-spacing: 0.4px;
  }
</style></head>
<body><div class="slide slide-8 dark">
  <div class="stripe-top"></div>
  <div class="body">
    <div class="center">
      <svg class="logomark" viewBox="0 0 200 200">
        <rect x="58" y="88" width="12" height="44" rx="6"/>
        <rect x="80" y="62" width="12" height="70" rx="6"/>
        <rect x="102" y="76" width="12" height="56" rx="6"/>
        <rect x="124" y="94" width="12" height="38" rx="6"/>
      </svg>
      <div class="wordmark">cadence</div>
      <div class="tagline">Management in rhythm.</div>
      <div class="divider"></div>
      <div class="cta-eyebrow">Free to start</div>
      <div class="url">cadencehq.co</div>
    </div>
    <div class="footer">Built for managers with one to ten direct reports.</div>
  </div>
  <div class="stripe-bot"></div>
</div></body></html>
