<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../base.css">
<style>
  .slide-4 .body {
    padding: 80px 96px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center;
  }
  .slide-4 .small-bars {
    width: 88px; height: 88px;
    margin-bottom: 56px;
  }
  .slide-4 .small-bars rect { fill: var(--amber); }
  .slide-4 .hero {
    font-family: 'DM Sans'; font-weight: 700;
    font-size: 144px; line-height: 0.98; letter-spacing: -3px;
    color: var(--cream);
  }
  .slide-4 .hero .accent { color: var(--amber); }
  .slide-4 .sub {
    font-family: 'Source Sans 3'; font-weight: 400;
    font-size: 28px; line-height: 1.55; color: var(--warmstone);
    max-width: 760px;
    margin-top: 56px;
  }
</style></head>
<body><div class="slide slide-4 dark">
  <div class="stripe-top"></div>
  <div class="body">
    <svg class="small-bars" viewBox="0 0 200 200">
      <rect x="58" y="88" width="12" height="44" rx="6"/>
      <rect x="80" y="62" width="12" height="70" rx="6"/>
      <rect x="102" y="76" width="12" height="56" rx="6"/>
      <rect x="124" y="94" width="12" height="38" rx="6"/>
    </svg>
    <div class="hero">It's a <span class="accent">rhythm</span><br>problem.</div>
    <div class="sub">Not a focus problem. Not a discipline problem. The work of being a good manager keeps colliding with the work of being a manager at all.</div>
  </div>
  <div class="stripe-bot"></div>
</div></body></html>
