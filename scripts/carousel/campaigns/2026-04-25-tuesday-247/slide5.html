<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../base.css">
<style>
  .slide-5 .body {
    padding: 80px 80px 96px;
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 32px;
  }
  .slide-5 .headline {
    font-size: 84px; line-height: 1.0; letter-spacing: -2px;
    color: var(--charcoal); max-width: 880px;
    font-weight: 700; font-family: 'DM Sans';
  }
  .slide-5 .headline .accent { color: var(--amber); }
  .slide-5 .frame {
    align-self: center;
    width: 920px;
    margin: 0 auto;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 16px 40px rgba(28, 24, 18, 0.12);
    overflow: hidden;
  }
  .slide-5 .frame img {
    display: block;
    width: 100%;
    height: auto;
  }
</style></head>
<body><div class="slide slide-5">
  <div class="stripe-top"></div>
  <div class="body">
    <div class="eyebrow">One-on-Ones</div>
    <div class="headline">The whole 1:1,<br><span class="accent">in one place.</span></div>
    <div class="frame">
      <img src="../../../../public/screenshots/one-on-one-detail.png" alt="Cadence 1:1 detail view">
    </div>
  </div>
  <div class="stripe-bot"></div>
</div></body></html>
