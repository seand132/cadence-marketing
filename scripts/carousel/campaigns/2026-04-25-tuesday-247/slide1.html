<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../base.css">
<style>
  .slide-1 .body {
    padding: 80px 96px 96px;
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    gap: 0;
  }
  .slide-1 .top-row { align-items: center; }
  .slide-1 .top-row .bars { width: 56px; height: 56px; }
  .slide-1 .top-row .bars rect { fill: var(--amber); }
  .slide-1 .hero-block {
    align-self: end;
  }
  .slide-1 .hero {
    font-family: 'DM Sans'; font-weight: 700;
    font-size: 200px; line-height: 0.94; letter-spacing: -5px;
    color: var(--charcoal);
  }
  .slide-1 .hero .time {
    color: var(--amber); display: block; margin-top: 4px;
  }
  .slide-1 .hero .pm {
    font-size: 100px; letter-spacing: -1px; margin-left: 8px;
    vertical-align: 36px;
  }
  .slide-1 .footnote {
    font-family: 'Source Sans 3'; font-size: 26px; color: var(--warmstone);
    line-height: 1.5; max-width: 640px;
    margin-top: 56px;
    padding-bottom: 80px;
  }
  .slide-1 .swipe {
    position: static;
    text-align: left;
    font-family: 'DM Sans'; font-weight: 600;
    font-size: 16px; letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--warmstone);
    display: inline-flex; align-items: center; gap: 12px;
  }
  .slide-1 .swipe::after {
    content: ''; width: 28px; height: 1px; background: var(--warmstone);
  }
</style></head>
<body><div class="slide slide-1">
  <div class="stripe-top"></div>
  <div class="body">
    <div class="top-row">
      <div class="eyebrow">A Tuesday in Management</div>
      <svg class="bars" viewBox="0 0 200 200">
        <rect x="58" y="88" width="12" height="44" rx="6"/>
        <rect x="80" y="62" width="12" height="70" rx="6"/>
        <rect x="102" y="76" width="12" height="56" rx="6"/>
        <rect x="124" y="94" width="12" height="38" rx="6"/>
      </svg>
    </div>
    <div></div>
    <div class="hero-block">
      <div class="hero">Tuesday.<span class="time">2:47<span class="pm">pm</span></span></div>
      <p class="footnote">A small moment that says more about modern management than any framework will.</p>
    </div>
    <div class="swipe">Swipe</div>
  </div>
  <div class="stripe-bot"></div>
</div></body></html>
