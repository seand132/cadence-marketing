<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../../base.css">
<style>
  .slide-3 .body {
    padding: 80px 96px 96px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 48px;
  }
  .slide-3 .headline {
    font-size: 124px; line-height: 0.98; letter-spacing: -3px;
    color: var(--charcoal);
    font-weight: 700; font-family: 'DM Sans';
    align-self: end;
  }
  .slide-3 .headline .accent { color: var(--amber); }
  .slide-3 .scatter {
    display: flex; flex-direction: column; gap: 18px;
  }
  .slide-3 .row {
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 28px;
    padding: 28px 32px;
    border: 1px dashed var(--border);
    border-radius: 12px;
    background: rgba(255,255,255,0.5);
  }
  .slide-3 .row .what {
    font-family: 'DM Sans'; font-weight: 500;
    font-size: 28px; color: var(--charcoal);
  }
  .slide-3 .row .arrow {
    font-family: 'DM Sans'; font-weight: 400;
    font-size: 24px; color: var(--warmstone);
  }
  .slide-3 .row .where {
    font-family: 'DM Sans'; font-weight: 600;
    font-size: 28px; color: var(--amber);
    text-align: right;
  }
</style></head>
<body><div class="slide slide-3">
  <div class="stripe-top"></div>
  <div class="body">
    <div class="eyebrow">But where's the prep?</div>
    <div class="headline">Three places.<br><span class="accent">None is here.</span></div>
    <div class="scatter">
      <div class="row">
        <div class="what">Last week's 1:1 notes</div>
        <div class="arrow">→</div>
        <div class="where">Slack DMs</div>
      </div>
      <div class="row">
        <div class="what">His Q2 retention KPI</div>
        <div class="arrow">→</div>
        <div class="where">A spreadsheet</div>
      </div>
      <div class="row">
        <div class="what">The task he flagged Monday</div>
        <div class="arrow">→</div>
        <div class="where">Your head</div>
      </div>
    </div>
  </div>
  <div class="stripe-bot"></div>
</div></body></html>
